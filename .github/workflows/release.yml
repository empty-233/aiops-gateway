name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  APP_NAME: aiops-gateway
  CGO_ENABLED: '1'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            goarch: amd64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p "package/${APP_NAME}"
          go build -trimpath -ldflags="-s -w" -o "package/${APP_NAME}/${APP_NAME}" ./cmd/server
          cp LICENSE README.md "package/${APP_NAME}/"
          mkdir -p "package/${APP_NAME}/configs"
          cp configs/config.example.yaml "package/${APP_NAME}/configs/config.yaml"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="${APP_NAME}-${{ matrix.target }}.tar.gz"
          tar -czf "dist/${archive}" -C package "${APP_NAME}"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          else
            (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
