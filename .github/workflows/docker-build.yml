name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/aiops-gateway
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/aiops-gateway

jobs:
  docker-build:
    name: Build ${{ matrix.arch }} image
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE_NAME }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=ref,event=tag,suffix=-${{ matrix.arch }}
            type=semver,pattern={{version}},suffix=-${{ matrix.arch }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.arch }}
            type=semver,pattern={{major}},suffix=-${{ matrix.arch }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: false

  docker-manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Docker release tag must look like v1.2.3 or v1.2.3-rc.1, got: ${version}" >&2
            exit 1
          fi

          semver="${version#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "semver=${semver}" >> "${GITHUB_OUTPUT}"

          if [[ "${version}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "major=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"
            echo "minor=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "${GITHUB_OUTPUT}"
            echo "is_release=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_release=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create and push multi-arch manifest for GHCR
        shell: bash
        run: |
          set -euo pipefail

          image="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}"
          version="${{ steps.version.outputs.version }}"
          semver="${{ steps.version.outputs.semver }}"
          major="${{ steps.version.outputs.major }}"
          minor="${{ steps.version.outputs.minor }}"
          is_release="${{ steps.version.outputs.is_release }}"

          docker buildx imagetools create -t "${image}:${version}" \
            "${image}:${semver}-amd64" \
            "${image}:${semver}-arm64"

          docker buildx imagetools create -t "${image}:${semver}" \
            "${image}:${semver}-amd64" \
            "${image}:${semver}-arm64"

          if [[ -n "${minor}" ]]; then
            docker buildx imagetools create -t "${image}:${minor}" \
              "${image}:${semver}-amd64" \
              "${image}:${semver}-arm64"
          fi

          if [[ -n "${major}" ]]; then
            docker buildx imagetools create -t "${image}:${major}" \
              "${image}:${semver}-amd64" \
              "${image}:${semver}-arm64"
          fi

          if [[ "${is_release}" == "true" ]]; then
            docker buildx imagetools create -t "${image}:latest" \
              "${image}:${semver}-amd64" \
              "${image}:${semver}-arm64"
          fi

      - name: Create and push multi-arch manifest for Docker Hub
        shell: bash
        run: |
          set -euo pipefail

          image="${{ env.DOCKERHUB_IMAGE_NAME }}"
          version="${{ steps.version.outputs.version }}"
          semver="${{ steps.version.outputs.semver }}"
          major="${{ steps.version.outputs.major }}"
          minor="${{ steps.version.outputs.minor }}"
          is_release="${{ steps.version.outputs.is_release }}"

          docker buildx imagetools create -t "${image}:${version}" \
            "${image}:${semver}-amd64" \
            "${image}:${semver}-arm64"

          docker buildx imagetools create -t "${image}:${semver}" \
            "${image}:${semver}-amd64" \
            "${image}:${semver}-arm64"

          if [[ -n "${minor}" ]]; then
            docker buildx imagetools create -t "${image}:${minor}" \
              "${image}:${semver}-amd64" \
              "${image}:${semver}-arm64"
          fi

          if [[ -n "${major}" ]]; then
            docker buildx imagetools create -t "${image}:${major}" \
              "${image}:${semver}-amd64" \
              "${image}:${semver}-arm64"
          fi

          if [[ "${is_release}" == "true" ]]; then
            docker buildx imagetools create -t "${image}:latest" \
              "${image}:${semver}-amd64" \
              "${image}:${semver}-arm64"
          fi

      - name: Output image details
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          ghcr_image="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}"
          dockerhub_image="${{ env.DOCKERHUB_IMAGE_NAME }}"

          echo "### Multi-Arch Docker Images Published" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Platforms:** linux/amd64, linux/arm64" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "#### Docker Hub" >> "${GITHUB_STEP_SUMMARY}"
          echo "- \`docker pull ${dockerhub_image}:${version}\`" >> "${GITHUB_STEP_SUMMARY}"
          if [[ "${{ steps.version.outputs.is_release }}" == "true" ]]; then
            echo "- \`docker pull ${dockerhub_image}:latest\`" >> "${GITHUB_STEP_SUMMARY}"
          fi
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "#### GitHub Container Registry" >> "${GITHUB_STEP_SUMMARY}"
          echo "- \`docker pull ${ghcr_image}:${version}\`" >> "${GITHUB_STEP_SUMMARY}"
          if [[ "${{ steps.version.outputs.is_release }}" == "true" ]]; then
            echo "- \`docker pull ${ghcr_image}:latest\`" >> "${GITHUB_STEP_SUMMARY}"
          fi
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "\`\`\`bash" >> "${GITHUB_STEP_SUMMARY}"
          echo "docker run -d --name aiops-gateway -p 8080:8080 ${dockerhub_image}:${version}" >> "${GITHUB_STEP_SUMMARY}"
          echo "\`\`\`" >> "${GITHUB_STEP_SUMMARY}"
