server:
  port: 8080
  mode: debug

ai:
  api_key: "YOUR_API_KEY"
  model: "YOUR_MODEL_NAME"
  channel: "compatible-openai"
  base_url: "https://api.openai.com/v1"
  prompt: "你是 AIOps Gateway 的告警分析助手,请根据以下提供的信息进行分析。"
  timeout: 30s
  temperature: 0.9
  queue_size: 100
  worker_count: 1

database:
  driver: mysql
  sqlite:
    path: data/data.db
  mysql:
    host: 127.0.0.1
    port: 3306
    username: aiops_gateway
    password: "YOUR_MYSQL_PASSWORD"
    database: aiops_gateway
    charset: utf8mb4
    loc: Local

query:
  range_time: 1h
  step: 1m

logs:
  max_lines: 5
  sources:
    - label_key: "job"
      label_value: "your_job_name"
      fuzzy_match: false
      type: file
      path: "/path/to/your/log/file.log"

notify:
  enabled: true
  channels:
    - name: "notification-channel"
      type: "bark"
      enabled: true
      server_url: "https://api.day.app"
      key: "YOUR_NOTIFICATION_KEY"
