server:
  port: 8080
  mode: debug

ai:
  api_key: "YOUR_API_KEY"
  model: "claude-sonnet-4-20250514"
  prompt: "System load above 80% or disk IO above 90%"
  timeout: 30s
  temperature: 0.9

database:
  dsn: "data/log-analyzer.db"

query:
  query_range_time: 1h
  query_step: 1m

logs:
  max_lines: 50
  sources:
    - label_key: "job"
      label_value: "syslog"
      type: file
      path: "/var/log/syslog"
